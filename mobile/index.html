<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11.11 Server Survival - Tap</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-white);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      transition: background-color 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="connectionStatus" class="status-badge status-mock">Mock Mode</div>
  <div id="coinContainer" class="coin-container"></div>
  
  <div class="mobile-container">
    <div id="waitingScreen" style="animation: float 3s ease-in-out infinite;">
      <div class="waiting-sign">
        <h1 id="status">Waiting for Admin...</h1>
      </div>
      <div class="sign-post"></div>
    </div>
    
    <div id="gameScreen" style="display: none;">
      <button id="tapBtn" class="tap-button">
        <div class="bag-outline">
          <span class="shopee-text">Shopee</span>
          <span class="eleven-eleven">11.11</span>
        </div>
      </button>
    </div>
    
    <div class="counter">Total Taps: <span id="tapCount">0</span></div>
    <div id="systemWarning" class="system-warning">SYSTEM CONGESTED</div>
  </div>

  <div id="crashedOverlay" class="overlay">
    <h1 class="crashed">SYSTEM OVERLOADED<br>11.11 CRASH</h1>
  </div>

  <div id="successOverlay" class="overlay">
    <h1 class="success">SYSTEM STABLE<br>AI AUTOSCALING SUCCESS</h1>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    window.onload = () => {
      const connectionStatus = document.getElementById('connectionStatus');
      if (typeof isLiveMode === 'function' && isLiveMode()) {
        connectionStatus.innerText = "Live: Firebase Connected";
        connectionStatus.className = "status-badge status-live";
      } else {
        connectionStatus.innerText = "Mock: Local Only";
        connectionStatus.className = "status-badge status-mock";
      }

      const tapBtn = document.getElementById('tapBtn');
      const tapCountDisplay = document.getElementById('tapCount');
      const waitingScreen = document.getElementById('waitingScreen');
      const gameScreen = document.getElementById('gameScreen');
      const systemWarning = document.getElementById('systemWarning');
      const coinContainer = document.getElementById('coinContainer');
      
      let localTaps = 0;
      let coinInterval;

      function spawnCoin() {
        const coin = document.createElement('div');
        coin.className = 'coin';
        const startLeft = Math.random() * (window.innerWidth - 90);
        coin.style.left = startLeft + 'px';
        const duration = 4 + Math.random() * 2;
        coin.style.animationDuration = duration + 's';
        coin.onclick = (e) => { e.stopPropagation(); collectTap(); coin.remove(); };
        coinContainer.appendChild(coin);
        setTimeout(() => { if(coin.parentNode) coin.remove(); }, duration * 1000);
      }

      function collectTap() {
        localTaps++;
        tapCountDisplay.innerText = localTaps;
        incrementGlobalClicks();
        if (window.navigator.vibrate) window.navigator.vibrate(30);
      }

      tapBtn.addEventListener('click', collectTap);

      if (typeof onGameStateChange === 'function') {
        onGameStateChange((state) => {
          if (state === 'active') {
            document.body.classList.add('shopee-active');
            waitingScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            tapBtn.classList.add('pulse');
            clearInterval(coinInterval);
            coinInterval = setInterval(spawnCoin, 700);
          } else if (state === 'waiting') {
            document.body.classList.remove('shopee-active');
            waitingScreen.style.display = 'block';
            gameScreen.style.display = 'none';
            localTaps = 0;
            tapCountDisplay.innerText = "0";
            clearInterval(coinInterval);
            coinContainer.innerHTML = '';
          } else {
            // Crashed or Success
            gameScreen.style.display = 'block';
            tapBtn.classList.remove('pulse');
            clearInterval(coinInterval);
            coinContainer.innerHTML = '';
          }
        });
      }

      setInterval(() => {
        if (typeof getGlobalClicks === 'function') {
          const clicks = getGlobalClicks();
          if (clicks > 150) {
            systemWarning.innerText = "Too many users!";
            systemWarning.classList.add('active');
          } else if (clicks > 80) {
            systemWarning.innerText = "System Congested...";
            systemWarning.classList.add('active');
          } else {
            systemWarning.classList.remove('active');
          }
        }
      }, 1000);
    };
  </script>
</body>
</html>
