<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11.11 Server Survival - Tap</title>
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-white);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      transition: background-color 0.2s ease;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div id="connectionStatus" class="status-badge status-mock">Mock Mode</div>
  <div id="coinContainer" class="coin-container"></div>
  
  <div class="mobile-container">
    <div id="waitingScreen" style="animation: float 3s ease-in-out infinite;">
      <div class="waiting-sign">
        <h1 id="status">Waiting for Admin...</h1>
      </div>
      <div class="sign-post"></div>
    </div>
    
    <div id="gameScreen" style="display: none; width: 100%;">
      <!-- Removed title for cleaner UI -->
      <div class="shopee-logo-container">
        <div class="bag-outline">
          <span class="shopee-text">Shopee</span>
          <span class="eleven-eleven">11.11</span>
        </div>
      </div>
    </div>
    
    <div class="counter" style="text-align: center; width: 100%;">Total Taps: <span id="tapCount">0</span></div>
    <div id="systemWarning" class="system-warning">SYSTEM CONGESTED</div>
  </div>

  <div id="crashedOverlay" class="overlay">
    <h1 class="crashed">SYSTEM OVERLOADED<br>11.11 CRASH</h1>
  </div>

  <div id="successOverlay" class="overlay">
    <h1 class="success">SYSTEM STABLE<br>AI AUTOSCALING SUCCESS</h1>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="../assets/app.js"></script>
  <script>
    window.onload = () => {
      const connectionStatus = document.getElementById('connectionStatus');
      if (typeof isLiveMode === 'function' && isLiveMode()) {
        connectionStatus.innerText = "Live: Firebase Connected";
        connectionStatus.className = "status-badge status-live";
      } else {
        connectionStatus.innerText = "Mock: Local Only";
        connectionStatus.className = "status-badge status-mock";
      }

      const tapCountDisplay = document.getElementById('tapCount');
      const waitingScreen = document.getElementById('waitingScreen');
      const gameScreen = document.getElementById('gameScreen');
      const systemWarning = document.getElementById('systemWarning');
      const coinContainer = document.getElementById('coinContainer');
      const crashedOverlay = document.getElementById('crashedOverlay');
      const successOverlay = document.getElementById('successOverlay');
      
      let localTaps = 0;
      let coinInterval;
      let isGameActive = false;
      let currentRoundMode = '';

      function spawnCoin() {
        if (!isGameActive) return;
        const coin = document.createElement('div');
        coin.className = 'coin';
        const startLeft = Math.random() * (window.innerWidth - 90);
        coin.style.left = startLeft + 'px';
        const duration = 4 + Math.random() * 2;
        coin.style.animationDuration = duration + 's';
        
        coin.onclick = (e) => {
          e.stopPropagation();
          localTaps++;
          tapCountDisplay.innerText = localTaps;
          incrementGlobalClicks();
          coin.remove();
          if (window.navigator.vibrate) window.navigator.vibrate(30);
        };

        coinContainer.appendChild(coin);
        setTimeout(() => { if(coin.parentNode) coin.remove(); }, duration * 1000);
      }

      if (typeof onGameStateChange === 'function') {
        onGameStateChange((state) => {
          if (state && state.startsWith('active')) {
            isGameActive = true;
            currentRoundMode = state === 'active_reactive' ? 'reactive' : 'predictive';
            document.body.classList.add('shopee-active');
            waitingScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            crashedOverlay.classList.remove('active');
            successOverlay.classList.remove('active');
            
            if (currentRoundMode === 'predictive') {
              systemWarning.innerText = "AI SCALING ACTIVE";
              systemWarning.className = "system-warning active success-mode";
            } else {
              systemWarning.className = "system-warning";
              systemWarning.innerText = "SYSTEM CONGESTED";
            }

            clearInterval(coinInterval);
            coinInterval = setInterval(spawnCoin, 700);
          } else if (state === 'crashed') {
            isGameActive = false;
            gameScreen.style.display = 'block';
            crashedOverlay.classList.add('active');
            successOverlay.classList.remove('active');
            clearInterval(coinInterval);
            systemWarning.classList.remove('active');
            coinContainer.innerHTML = '';
          } else if (state === 'success') {
            isGameActive = false;
            gameScreen.style.display = 'block';
            successOverlay.classList.add('active');
            crashedOverlay.classList.remove('active');
            clearInterval(coinInterval);
            systemWarning.classList.remove('active');
            coinContainer.innerHTML = '';
          } else if (state === 'waiting') {
            isGameActive = false;
            document.body.classList.remove('shopee-active');
            waitingScreen.style.display = 'block';
            gameScreen.style.display = 'none';
            crashedOverlay.classList.remove('active');
            successOverlay.classList.remove('active');
            localTaps = 0;
            tapCountDisplay.innerText = "0";
            clearInterval(coinInterval);
            systemWarning.classList.remove('active');
            coinContainer.innerHTML = '';
          }
        });
      }

      setInterval(() => {
        if (typeof getGlobalClicks === 'function' && isGameActive && currentRoundMode === 'reactive') {
          const clicks = getGlobalClicks();
          if (clicks > 150) {
            systemWarning.innerText = "SYSTEM OVERLOADED!";
            systemWarning.className = "system-warning active";
          } else if (clicks > 80) {
            systemWarning.innerText = "SYSTEM CONGESTED...";
            systemWarning.className = "system-warning active";
          } else {
            systemWarning.classList.remove('active');
          }
        }
      }, 1000);
    };
  </script>
</body>
</html>
